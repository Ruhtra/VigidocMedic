version: "3.8"

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: vigidoc_test_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vigitest
      POSTGRES_PASSWORD: vigitest_secret
      POSTGRES_DB: vigidoc_test
    ports:
      - "5433:5432" # Porta diferente para não conflitar com o banco de dev
    volumes:
      - vigidoc_test_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigitest -d vigidoc_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vigidoc_test_pgdata:
    driver: local
